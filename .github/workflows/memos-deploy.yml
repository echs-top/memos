name: 部署前端与编译压缩版无头后端

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '请输入 Memos 源码压缩包直链 (zip/tar.gz)'
        required: true
        default: 'https://github.com/usememos/memos/archive/refs/tags/v0.28.0.zip'
      memos_backend:
        description: '你的 Memos 后端地址 (必须包含 https://)'
        required: true
        default: 'https://demo.usememos.com'

jobs:
  build-deploy-and-compile:
    runs-on: ubuntu-latest
    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 安装 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: 安装 UPX 压缩工具
        run: sudo apt-get install -y upx

      - name: 清理当前目录
        run: |
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.gitignore' ! -name '.' -exec rm -rf {} +

      - name: 下载并解压源码
        run: |
          curl -L -o memos_source.tmp "${{ github.event.inputs.download_url }}"
          if [[ "${{ github.event.inputs.download_url }}" == *.tar.gz ]]; then
            tar -xzf memos_source.tmp
          else
            unzip -o memos_source.tmp
          fi
          rm memos_source.tmp

      - name: 编译 Memos 真实前端并提取
        run: |
          ROOT_DIR=$(find . -maxdepth 1 -type d ! -name "." ! -name ".git" ! -name ".github" -print -quit)
          echo "ROOT_DIR=$ROOT_DIR" >> $GITHUB_ENV
          
          cd "$ROOT_DIR/web"
          pnpm install
          pnpm build
          
          cp -r dist/* ../../
          cd ../../

      - name: 生成精准路由配置 (Vercel & Netlify)
        run: |
          DOMAIN=$(echo "${{ github.event.inputs.memos_backend }}" | sed 's:/*$::')
          
          cat <<EOF > vercel.json
          {
            "version": 2,
            "rewrites": [
              { "source": "/api/(.*)", "destination": "$DOMAIN/api/\$1" },
              { "source": "/memos.api.v1.(.*)", "destination": "$DOMAIN/memos.api.v1.\$1" },
              { "source": "/file/(.*)", "destination": "$DOMAIN/file/\$1" },
              { "source": "/(.*)", "destination": "/index.html" }
            ]
          }
          EOF

          cat <<EOF > netlify.toml
          [[redirects]]
            from = "/api/*"
            to = "$DOMAIN/api/:splat"
            status = 200
            force = true
          [[redirects]]
            from = "/memos.api.v1.*"
            to = "$DOMAIN/memos.api.v1.:splat"
            status = 200
            force = true
          [[redirects]]
            from = "/file/*"
            to = "$DOMAIN/file/:splat"
            status = 200
            force = true
          [[redirects]]
            from = "/*"
            to = "/index.html"
            status = 200
          EOF

      - name: 提交前端构建产物至仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if git diff --staged --quiet; then
            echo "没有内容变更，跳过提交。"
          else
            git commit -m "chore: 更新前端静态资源与路由规则"
            git push
          fi

      - name: 替换为极简前端并编译 & 压缩后端
        run: |
          cd "${{ env.ROOT_DIR }}"
          
          # 1. 注入极简前端
          rm -rf web/dist/*
          echo "<html><body>已关闭前端显示</body></html>" > web/dist/index.html
          
          # 2. 编译后端
          export GOOS=linux
          export GOARCH=amd64
          export CGO_ENABLED=0
          go build -ldflags="-s -w" -trimpath -o ../memos_headless ./cmd/memos/main.go
          
          cd ..
          
          # 3. 使用 UPX 进行高强度压缩 (ldflags 中的 -s -w 已经去掉了调试符号，upx 效果更佳)
          upx --best --lzma memos_headless
          
          # 4. 打包成 tar.gz 并保留执行权限
          chmod +x memos_headless
          tar -czvf memos_headless_linux_amd64.tar.gz memos_headless
          
          rm -rf "${{ env.ROOT_DIR }}"

      - name: 上传压缩版后端
        uses: actions/upload-artifact@v4
        with:
          name: memos-headless-bundle
          path: memos_headless_linux_amd64.tar.gz
          retention-days: 7
