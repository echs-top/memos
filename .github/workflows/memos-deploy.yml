name: 部署纯前端静态资源 (Node 22 & pnpm 10)

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '请输入 Memos 源码压缩包直链 (zip/tar.gz)'
        required: true
        default: 'https://github.com/usememos/memos/archive/refs/tags/v0.28.0.tar.gz'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4

      - name: 安装 Node.js 22 环境
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装 pnpm 10 环境
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 清理当前目录
        run: |
          # 确保发布环境纯净
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.gitignore' ! -name '.' -exec rm -rf {} +

      - name: 下载并解压 Memos 源码
        run: |
          curl -L -o memos_source.tmp "${{ github.event.inputs.download_url }}"
          if [[ "${{ github.event.inputs.download_url }}" == *.tar.gz ]]; then
            tar -xzf memos_source.tmp
          else
            unzip -o memos_source.tmp
          fi
          rm memos_source.tmp

      - name: 核心编译流程 (现代前端构建)
        run: |
          # 1. 定位源码根目录
          ROOT_DIR=$(find . -maxdepth 1 -type d ! -name "." ! -name ".git" ! -name ".github" -print -quit)
          
          cd "$ROOT_DIR/web"
          
          # 2. 使用 pnpm 10 安装依赖 (会自动向下兼容并处理旧版锁文件)
          pnpm install
          
          # 3. 执行生产环境打包
          pnpm build
          
          # 4. 提取静态资源到仓库根目录
          cp -r dist/* ../../
          cd ../..
          
          # 5. 彻底删除源码文件夹，不留痕迹
          rm -rf "$ROOT_DIR"

      - name: 生成前端单页路由配置 (SPA 兼容)
        run: |
          cat <<EOF > netlify.toml
          [[headers]]
            for = "/*"
            [headers.values]
              Access-Control-Allow-Origin = "*"
              Access-Control-Allow-Methods = "*"
              Access-Control-Allow-Headers = "*"
          EOF
          
          cat <<EOF > worker.js
          export default {
            async fetch(request, env, ctx) {
              // 跨域
              const corsHeaders = {
                "Access-Control-Allow-Origin": "*",
                "Access-Control-Allow-Methods": "*",
                "Access-Control-Allow-Headers": "*",
              };
              // OPTIONS预检请求
              if (request.method === "OPTIONS") {
                return new Response(null, { headers: corsHeaders });
              }
              try {
                // 2. 从全局绑定的静态资源中获取文件
                const response = await env.ASSETS.fetch(request);
          
                // 文件不存在返回404
                if (response.status === 404) {
                  return new Response("File not found", { status: 404 });
                }
                // 重写Response
                const newResponse = new Response(response.body, response);
                // 设置跨域头
                Object.keys(corsHeaders).forEach(key => {
                  newResponse.headers.set(key, corsHeaders[key]);
                });
                return newResponse;
              } catch (e) {
                // 错误处理
                return new Response("Internal Server Error", { status: 500 });
              }
            }
          };
          EOF
          
          cat <<EOF > wrangler.toml
          # Worker名称
          name = "memos"
          # 入口文件路径
          main = "worker.js"
          # 日期
          compatibility_date = "2026-05-20"
          # 配置静态资源目录
          [assets]
          directory = "./"
          EOF

      - name: 提交前端构建产物至仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          
          # 检查是否有文件变更，避免空提交导致 Action 报错
          if git diff --staged --quiet; then
            echo "没有内容变更，跳过提交。"
          else
            git commit -m "chore: 自动化构建纯前端静态资源 (Node 22 + pnpm 10)"
            git push
          fi
