name: 部署前端与编译无头后端 (二合一完整版)

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '请输入 Memos 源码压缩包直链 (zip/tar.gz)'
        required: true
        default: 'https://github.com/usememos/memos/archive/refs/tags/v0.27.1.zip'
      memos_backend:
        description: '你的 Memos 后端地址 (必须包含 https://)'
        required: true
        default: 'https://demo.usememos.com'

jobs:
  build-deploy-and-compile:
    runs-on: ubuntu-latest
    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 安装 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: 清理当前目录
        run: |
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.gitignore' ! -name '.' -exec rm -rf {} +

      - name: 下载并解压源码
        run: |
          curl -L -o memos_source.tmp "${{ github.event.inputs.download_url }}"
          if [[ "${{ github.event.inputs.download_url }}" == *.tar.gz ]]; then
            tar -xzf memos_source.tmp
          else
            unzip -o memos_source.tmp
          fi
          rm memos_source.tmp

      - name: 编译 Memos 真实前端并提取
        run: |
          ROOT_DIR=$(find . -maxdepth 1 -type d ! -name "." ! -name ".git" ! -name ".github" -print -quit)
          echo "ROOT_DIR=$ROOT_DIR" >> $GITHUB_ENV
          
          cd "$ROOT_DIR/web"
          
          pnpm install
          pnpm build
          
          cp -r dist/* ../../
          cd ../../

      - name: 生成精准路由配置 (Vercel & Netlify)
        run: |
          DOMAIN=$(echo "${{ github.event.inputs.memos_backend }}" | sed 's:/*$::')
          
          cat <<EOF > vercel.json
          {
            "version": 2,
            "rewrites": [
              { "source": "/api/(.*)", "destination": "$DOMAIN/api/\$1" },
              { "source": "/memos.api.v1.(.*)", "destination": "$DOMAIN/memos.api.v1.\$1" },
              { "source": "/file/(.*)", "destination": "$DOMAIN/file/\$1" },
              { "source": "/(.*)", "destination": "/index.html" }
            ]
          }
          EOF

          cat <<EOF > netlify.toml
          [[redirects]]
            from = "/api/*"
            to = "$DOMAIN/api/:splat"
            status = 200
            force = true

          [[redirects]]
            from = "/memos.api.v1.*"
            to = "$DOMAIN/memos.api.v1.:splat"
            status = 200
            force = true

          [[redirects]]
            from = "/file/*"
            to = "$DOMAIN/file/:splat"
            status = 200
            force = true

          [[redirects]]
            from = "/*"
            to = "/index.html"
            status = 200
          EOF

      - name: 提交前端构建产物至仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if git diff --staged --quiet; then
            echo "没有内容变更，跳过提交。"
          else
            git commit -m "chore: 编译 Memos 前端并更新精准路由 (Backend: ${{ github.event.inputs.memos_backend }})"
            git push
          fi

      - name: 替换为极简前端并编译 Go 无头后端
        run: |
          cd "${{ env.ROOT_DIR }}"
          
          rm -rf web/dist/*
          cat <<EOF > web/dist/index.html
          <!DOCTYPE html>
          <html lang="zh">
          <head>
              <meta charset="UTF-8">
              <title>Memos API</title>
          </head>
          <body>
              已关闭前端显示
          </body>
          </html>
          EOF
          
          export GOOS=linux
          export GOARCH=amd64
          export CGO_ENABLED=0
          go build -trimpath -o ../memos_headless ./bin/memos/main.go
          
          cd ..
          rm -rf "${{ env.ROOT_DIR }}"

      - name: 上传无头版后端供下载
        uses: actions/upload-artifact@v4
        with:
          name: memos-headless-linux-amd64
          path: memos_headless
          retention-days: 7
