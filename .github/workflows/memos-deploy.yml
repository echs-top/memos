name: 部署 Memos 前端 (精确路由版)

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '请输入 Memos 源码压缩包直链 (zip/tar.gz)'
        required: true
        default: 'https://github.com/usememos/memos/archive/refs/tags/v0.27.1.zip'
      memos_backend:
        description: '你的 Memos 后端地址 (必须包含 https://)'
        required: true
        default: 'https://demo.usememos.com'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 清理当前目录
        run: |
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.gitignore' ! -name '.' -exec rm -rf {} +

      - name: 下载并解压源码
        run: |
          curl -L -o memos_source.tmp "${{ github.event.inputs.download_url }}"
          if [[ "${{ github.event.inputs.download_url }}" == *.tar.gz ]]; then
            tar -xzf memos_source.tmp
          else
            unzip -o memos_source.tmp
          fi
          rm memos_source.tmp

      - name: 编译 Memos 前端
        run: |
          ROOT_DIR=$(find . -maxdepth 1 -type d ! -name "." ! -name ".git" ! -name ".github" -print -quit)
          echo "进入源码目录: $ROOT_DIR/web"
          cd "$ROOT_DIR/web"
          
          pnpm install
          pnpm build
          
          mv dist/* ../../
          cd ../../
          
          rm -rf "$ROOT_DIR"

      - name: 生成精准路由配置 (Vercel & Netlify)
        run: |
          DOMAIN=$(echo "${{ github.event.inputs.memos_backend }}" | sed 's:/*$::')
          
          # Vercel 强正则规则，仅保留 api, memos.api.v1 和 file
          cat <<EOF > vercel.json
          {
            "version": 2,
            "rewrites": [
              { "source": "/(?<route>api/.*)", "destination": "$DOMAIN/:route" },
              { "source": "/(?<route>memos.api.v1..*)", "destination": "$DOMAIN/:route" },
              { "source": "/(?<route>file/.*)", "destination": "$DOMAIN/:route" },
              { "source": "/(.*)", "destination": "/index.html" }
            ]
          }
          EOF

          # Netlify 规则同步精简
          cat <<EOF > netlify.toml
          [[redirects]]
            from = "/api/*"
            to = "$DOMAIN/api/:splat"
            status = 200
            force = true

          [[redirects]]
            from = "/memos.api.v1.*"
            to = "$DOMAIN/memos.api.v1.:splat"
            status = 200
            force = true

          [[redirects]]
            from = "/file/*"
            to = "$DOMAIN/file/:splat"
            status = 200
            force = true

          [[redirects]]
            from = "/*"
            to = "/index.html"
            status = 200
          EOF
          
          echo "精简版配置文件已生成，后端 API 指向: $DOMAIN"

      - name: 提交构建产物
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if git diff --staged --quiet; then
            echo "没有内容变更，跳过提交。"
          else
            git commit -m "chore: 编译 Memos 前端并更新精准路由 (Backend: ${{ github.event.inputs.memos_backend }})"
            git push
          fi
