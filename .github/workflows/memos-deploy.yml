name: 部署纯前端静态资源 (CDN)

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '请输入 Memos 源码压缩包直链 (zip/tar.gz)'
        required: true
        default: 'https://github.com/usememos/memos/archive/refs/tags/v0.28.0.zip'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 获取 Bun 最新版本号
        id: bun-version
        run: |
          # 从 GitHub API 获取 Bun 的最新 Tag（例如 v1.1.0）
          BUN_TAG=$(curl -s https://api.github.com/repos/oven-sh/bun/releases/latest | jq -r .tag_name)
          echo "最新 Bun 版本: $BUN_TAG"
          echo "version=$BUN_TAG" >> "$GITHUB_OUTPUT"

      - name: 配置 Bun 编译器与依赖全局缓存
        uses: actions/cache@v4
        id: bun-cache
        with:
          path: |
            ~/.bun-bin
            ~/.bun/install/cache
          # 用 Bun 的版本号作为 Key，一旦 Bun 官方发新版，Key 改变就会自动触发更新下载
          key: ${{ runner.os }}-bun-${{ steps.bun-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: 清理当前目录
        run: |
          # 仅保留 Git 必要目录，确保构建发布环境绝对纯净
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.gitignore' ! -name '.' -exec rm -rf {} +

      - name: 下载并解压 Memos 源码
        run: |
          curl -L -o memos_source.tmp "${{ github.event.inputs.download_url }}"
          if [[ "${{ github.event.inputs.download_url }}" == *.tar.gz ]]; then
            tar -xzf memos_source.tmp
          else
            unzip -o memos_source.tmp
          fi
          rm memos_source.tmp

      - name: 核心编译流程 (前端静态化)
        run: |
          # 1. 定位源码根目录
          ROOT_DIR=$(find . -maxdepth 1 -type d ! -name "." ! -name ".git" ! -name ".github" -print -quit)
          
          # 2. 检查缓存中是否存在 Bun，不存在（或有更新）则下载
          mkdir -p ~/.bun-bin
          if [ ! -f ~/.bun-bin/bun ]; then
            echo "未命中缓存或 Bun 有新版本，开始下载..."
            curl -L -o bun.zip "https://github.com/oven-sh/bun/releases/latest/download/bun-linux-x64.zip"
            unzip bun.zip
            mv bun-linux-x64/bun ~/.bun-bin/
            rm -rf bun.zip bun-linux-x64
            chmod +x ~/.bun-bin/bun
          else
            echo "命中 Bun 编译器缓存，跳过下载。"
          fi
          
          # 3. 将 Bun 复制到 web 目录下（完全符合你原本的构建脚本路径）
          cp ~/.bun-bin/bun "$ROOT_DIR/web/"
          
          # 4. 使用本地 Bun 编译真实前端并提取到仓库根目录
          cd "$ROOT_DIR/web"
          chmod +x bun
          ./bun install
          ./bun run build
          cp -r dist/* ../../
          cd ../..
          
          # 5. 彻底删除源码文件夹
          rm -rf "$ROOT_DIR"

      - name: 生成前端单页路由配置 (SPA 兼容)
        run: |
          cat <<EOF > netlify.toml
          [[headers]]
            for = "/*"
          [headers.values]
            Access-Control-Allow-Origin = "*"
            Access-Control-Allow-Methods = "*"
            Access-Control-Allow-Headers = "*"
          EOF

      - name: 提交前端构建产物至仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          
          # 检查是否有文件变更，避免空提交报错
          if git diff --staged --quiet; then
            echo "没有内容变更，跳过提交。"
          else
            git commit -m "chore: 自动化构建纯前端静态资源 (CDN)"
            git push
          fi
