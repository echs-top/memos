name: 部署前端与编译无头后端 (修复文件夹残留版)

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '请输入 Memos 源码压缩包直链 (zip/tar.gz)'
        required: true
        default: 'https://github.com/usememos/memos/archive/refs/tags/v0.28.0.zip'
      memos_backend:
        description: '你的 Memos 后端地址 (必须包含 https://)'
        required: true
        default: 'https://demo.usememos.com'
      target_arch:
        description: '选择后端编译架构'
        required: true
        default: 'linux_amd64'
        type: choice
        options:
          - linux_amd64
          - linux_arm64
          - linux_arm
          - windows_amd64
          - darwin_amd64
          - darwin_arm64

jobs:
  build-deploy-and-compile:
    runs-on: ubuntu-latest
    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 安装 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: 清理当前目录
        run: |
          # 仅保留关键目录，确保环境纯净
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.gitignore' ! -name '.' -exec rm -rf {} +

      - name: 下载并解压源码
        run: |
          curl -L -o memos_source.tmp "${{ github.event.inputs.download_url }}"
          if [[ "${{ github.event.inputs.download_url }}" == *.tar.gz ]]; then
            tar -xzf memos_source.tmp
          else
            unzip -o memos_source.tmp
          fi
          rm memos_source.tmp

      - name: 核心编译流程 (前端 + 后端)
        run: |
          # 1. 定位源码根目录
          ROOT_DIR=$(find . -maxdepth 1 -type d ! -name "." ! -name ".git" ! -name ".github" -print -quit)
          
          # 2. 编译真实前端并提取到仓库根目录
          cd "$ROOT_DIR/web"
          pnpm install
          pnpm build
          cp -r dist/* ../../
          cd ../..
          
          # 3. 准备无头后端编译 (注入极简前端)
          rm -rf "$ROOT_DIR/web/dist/"*
          echo "<html><body>已关闭前端显示</body></html>" > "$ROOT_DIR/web/dist/index.html"
          
          # 4. 执行后端交叉编译
          ARCH_SELECTION="${{ github.event.inputs.target_arch }}"
          export GOOS=$(echo $ARCH_SELECTION | cut -d'_' -f1)
          export GOARCH=$(echo $ARCH_SELECTION | cut -d'_' -f2)
          [ "$GOARCH" == "arm" ] && export GOARM=7
          export CGO_ENABLED=0
          
          OUTPUT_NAME="memos_headless"
          [ "$GOOS" == "windows" ] && OUTPUT_NAME="memos_headless.exe"
          
          cd "$ROOT_DIR"
          go build -ldflags="-s -w" -trimpath -o "../$OUTPUT_NAME" ./cmd/memos/main.go
          cd ..
          
          # 5. 【关键】将后端文件移出仓库目录，防止被 Git 提交
          mv "$OUTPUT_NAME" /tmp/memos_headless_bin
          echo "FINAL_BIN_NAME=$OUTPUT_NAME" >> $GITHUB_ENV
          
          # 6. 【关键】彻底删除源码文件夹，确保它不会出现在 git add 中
          rm -rf "$ROOT_DIR"

      - name: 生成精准路由配置 (Vercel & Netlify)
        run: |
          DOMAIN=$(echo "${{ github.event.inputs.memos_backend }}" | sed 's:/*$::')
          
          cat <<EOF > vercel.json
          {
            "version": 2,
            "rewrites": [
              { "source": "/api/(.*)", "destination": "$DOMAIN/api/\$1" },
              { "source": "/memos.api.v1.(.*)", "destination": "$DOMAIN/memos.api.v1.\$1" },
              { "source": "/file/(.*)", "destination": "$DOMAIN/file/\$1" },
              { "source": "/(.*)", "destination": "/index.html" }
            ]
          }
          EOF

          cat <<EOF > netlify.toml
          [[redirects]]
            from = "/api/*"
            to = "$DOMAIN/api/:splat"
            status = 200
            force = true
          [[redirects]]
            from = "/memos.api.v1.*"
            to = "$DOMAIN/memos.api.v1.:splat"
            status = 200
            force = true
          [[redirects]]
            from = "/file/*"
            to = "$DOMAIN/file/:splat"
            status = 200
            force = true
          [[redirects]]
            from = "/*"
            to = "/index.html"
            status = 200
          EOF

      - name: 提交前端构建产物至仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          # 检查是否有文件变更，避免空提交报错
          if git diff --staged --quiet; then
            echo "没有内容变更，跳过提交。"
          else
            git commit -m "chore: 更新前端静态资源与路由规则 (Backend: ${{ github.event.inputs.memos_backend }})"
            git push
          fi

      - name: 上传无头版后端原始文件
        uses: actions/upload-artifact@v4
        with:
          name: memos-headless-${{ github.event.inputs.target_arch }}
          # 从临时目录读取文件
          path: /tmp/memos_headless_bin
          retention-days: 7
